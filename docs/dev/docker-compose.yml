# Local development services for Superloom
# Usage: docker compose -f docs/dev/docker-compose.yml up -d

services:

  # --- Databases ---

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: app_dev
    volumes:
      - pg_data:/var/lib/postgresql/data

  mysql:
    image: mysql:9.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_password
      MYSQL_DATABASE: app_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: app_dev
    volumes:
      - mongo_data:/data/db

  # --- Cloud-Compatible Services ---

  # S3-compatible object storage (replaces AWS S3 in dev)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console
    environment:
      MINIO_ROOT_USER: dev_access_key
      MINIO_ROOT_PASSWORD: dev_secret_key
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # SQS-compatible message queue (replaces AWS SQS in dev)
  elasticmq:
    image: softwaremill/elasticmq:latest
    ports:
      - "9324:9324"     # SQS API
      - "9325:9325"     # Web console

volumes:
  pg_data:
  mysql_data:
  mongo_data:
  minio_data:
