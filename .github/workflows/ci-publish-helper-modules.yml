# CI/CD Pipeline: Test and Publish Helper Modules
#
# Strategy:
#   - STRICTLY SEQUENTIAL execution: test → publish → test → publish ...
#   - One module at a time, in dependency order
#   - This prevents race conditions and ensures dependencies are published
#     before dependent modules attempt to install them
#
# Execution Order:
#   1. detect
#   2. test-utils → publish-utils
#   3. test-debug → publish-debug
#   4. test-time → publish-time
#   5. test-client-crypto → publish-client-crypto
#   6. test-server-crypto → publish-server-crypto
#   7. test-instance → publish-instance
#   8. test-http → publish-http
#   9. test-storage-aws-s3-url-signer → publish-storage-aws-s3-url-signer
#   10. test-sql-sqlite → publish-sql-sqlite
#   11. test-storage-aws-s3 → publish-storage-aws-s3
#   12. test-nosql-aws-dynamodb → publish-nosql-aws-dynamodb
#   13. test-nosql-mongodb → publish-nosql-mongodb
#   14. test-queue-aws-sqs → publish-queue-aws-sqs
#   15. test-sql-mysql → publish-sql-mysql
#   16. test-sql-postgres → publish-sql-postgres
#   17. test-verify → publish-verify
#   18. test-verify-store-sqlite → publish-verify-store-sqlite
#   19. test-verify-store-postgres → publish-verify-store-postgres
#   20. test-verify-store-mysql → publish-verify-store-mysql
#   21. test-verify-store-mongodb → publish-verify-store-mongodb
#   22. test-verify-store-dynamodb → publish-verify-store-dynamodb
#   23. test-logger → publish-logger
#   24. test-logger-store-sqlite → publish-logger-store-sqlite
#   25. test-logger-store-postgres → publish-logger-store-postgres
#   26. test-logger-store-mysql → publish-logger-store-mysql
#   27. test-logger-store-dynamodb → publish-logger-store-dynamodb
#   28. test-logger-store-mongodb → publish-logger-store-mongodb
#   29. test-auth → publish-auth
#   30. test-auth-store-sqlite → publish-auth-store-sqlite
#   31. test-auth-store-postgres → publish-auth-store-postgres
#   32. test-auth-store-mysql → publish-auth-store-mysql
#   33. test-auth-store-mongodb → publish-auth-store-mongodb
#   34. test-auth-store-dynamodb → publish-auth-store-dynamodb
#
# Workflow behavior:
#   - Commit "wip: small fix"           → tests run sequentially, no publish
#   - Commit "fix: bug (bump to 1.0.1)" → tests run AND modules publish
#   - Commit reverting a version bump   → skipped gracefully at publish step

name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  # =========================================================================
  # Detect: which modules need testing and which need publishing.
  # Runs on every trigger.
  #
  # test_modules    = (modules with file changes) UNION (modules needing publish)
  # publish_modules = modules whose <name>@<version> is not yet on the registry
  #
  # The registry-existence check supports BOTH:
  #   - Steady-state version bumps (new version not yet on registry)
  #   - Fresh-state recovery (registry wiped, modules at unchanged versions)
  # See docs/dev/cicd-publishing.md for the full rationale.
  # =========================================================================
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      test_modules: ${{ steps.scan.outputs.test_modules }}
      publish_modules: ${{ steps.scan.outputs.publish_modules }}
      is_main_push: ${{ steps.scan.outputs.is_main_push }}
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Scan for changed modules and unpublished versions
        id: scan
        run: |
          # Determine trigger context
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            IS_MAIN_PUSH=true
          else
            IS_MAIN_PUSH=false
          fi
          echo "is_main_push=$IS_MAIN_PUSH" >> $GITHUB_OUTPUT

          # Step 1: Modules with file changes since the previous commit.
          # On orphan / initial commit (no parent), treat every tracked file as changed.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILE_LIST=$(git diff --name-only HEAD~1 HEAD)
          else
            FILE_LIST=$(git ls-tree -r --name-only HEAD)
          fi
          CHANGED_MODULES=$(echo "$FILE_LIST" \
            | grep -oP 'src/helper-modules-[\w-]+/js-[\w-]+' \
            | sort -u)

          # Step 2: Find every module on disk (canonical list)
          ALL_MODULES=$(ls -d src/helper-modules-*/js-* 2>/dev/null | sort -u)

          # Step 3: Build PUBLISH_MODULES via registry-existence check.
          # A module needs publishing if its current <name>@<version> is not on the registry.
          # Only run on main pushes — PRs and other refs never publish.
          PUBLISH_MODULES=""
          if [ "$IS_MAIN_PUSH" == "true" ]; then
            echo ""
            echo "=== Registry check (publish detection) ==="
            for MODULE in $ALL_MODULES; do
              PKG_PATH="$MODULE/package.json"
              if [ ! -f "$PKG_PATH" ]; then
                continue
              fi

              PKG_NAME=$(jq -r '.name // ""' "$PKG_PATH")
              PKG_VERSION=$(jq -r '.version // ""' "$PKG_PATH")
              if [ -z "$PKG_NAME" ] || [ -z "$PKG_VERSION" ]; then
                continue
              fi

              # npm view returns 0 if the version exists, non-zero otherwise.
              # On non-zero (404 or transient error), we err on the side of publishing —
              # the per-job safety net will skip if the version is actually present.
              if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null >/dev/null; then
                echo "  on registry:    $PKG_NAME@$PKG_VERSION"
              else
                echo "  needs publish:  $PKG_NAME@$PKG_VERSION"
                PUBLISH_MODULES="${PUBLISH_MODULES}${MODULE}"$'\n'
              fi
            done
          fi

          # Step 4: TEST_MODULES = CHANGED_MODULES UNION PUBLISH_MODULES.
          # We always test before publishing, even when no file changed in this commit.
          TEST_MODULES=$(printf '%s\n%s' "$CHANGED_MODULES" "$PUBLISH_MODULES" \
            | grep -v '^$' \
            | sort -u)

          # Encode both lists as JSON arrays for the workflow output
          TEST_JSON=$(printf '%s' "$TEST_MODULES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          PUBLISH_JSON=$(printf '%s' "$PUBLISH_MODULES" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "test_modules=$TEST_JSON" >> $GITHUB_OUTPUT
          echo "publish_modules=$PUBLISH_JSON" >> $GITHUB_OUTPUT

          echo ""
          echo "=== CI Summary ==="
          echo "Test modules:    $TEST_JSON"
          echo "Publish modules: $PUBLISH_JSON"
          echo "Main push:       $IS_MAIN_PUSH"


  # ###########################################################################
  #   MODULE 1: js-helper-utils (no dependencies)
  # ###########################################################################

  test-utils:
    needs: [detect]
    if: contains(needs.detect.outputs.test_modules, 'js-helper-utils')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
      - name: Install and test
        working-directory: src/helper-modules-core/js-helper-utils
        run: |
          npm install
          npm run lint --if-present
          cd _test && npm install && npm test

  publish-utils:
    needs: [detect, test-utils]
    if: |
      !cancelled() &&
      needs.detect.result == 'success' &&
      needs['test-utils'].result == 'success' &&
      needs.detect.outputs.publish_modules != '[]' &&
      needs.detect.outputs.publish_modules != '' &&
      contains(needs.detect.outputs.publish_modules, 'js-helper-utils')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
      - name: Pin npm to v10
        run: npm install -g npm@10
      - name: Publish
        working-directory: src/helper-modules-core/js-helper-utils
        run: |
          npm install
          PKG_NAME=$(jq -r '.name' package.json)
          PKG_VERSION=$(jq -r '.version' package.json)
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "⚠️ $PKG_NAME@$PKG_VERSION already published - skipping"
          else
            echo "Publishing $PKG_NAME@$PKG_VERSION..."
            npm publish
          fi


