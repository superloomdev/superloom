      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install module dependencies
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs
        run: npm install

      - name: Run lint
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs
        run: npm run lint --if-present

      - name: Run tests
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs/_test
        run: npm install && npm test

  publish-queue-aws-sqs:
    needs: [detect, test-queue-aws-sqs]
    if: >-
      needs.detect.outputs.publish_modules != '[]' &&
      needs.detect.outputs.publish_modules != '' &&
      contains(needs.detect.outputs.publish_modules, 'js-server-helper-queue-aws-sqs')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    services:
      elasticmq:
        image: softwaremill/elasticmq:1.6.9
        ports:
          - 9324:9324
        options: >-
          --health-cmd "curl -sf http://localhost:9324 || exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Pin npm to v10 (npm 11 crashes on GitHub Packages publish)
        run: npm install -g npm@10

      - name: Install dependencies
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs
        run: npm install

      - name: Check if version already published (safety net)
        id: check
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs
        run: |
          PKG_NAME=$(jq -r '.name' package.json)
          PKG_VERSION=$(jq -r '.version' package.json)
          echo "Checking if $PKG_NAME@$PKG_VERSION is already published..."

          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "  ⚠  $PKG_NAME@$PKG_VERSION is already published — skipping"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "  ✓ $PKG_NAME@$PKG_VERSION not yet published — proceeding"
          fi

      - name: Publish to GitHub Packages
        if: steps.check.outputs.already_published == 'false'
        working-directory: src/helper-modules-server/js-server-helper-queue-aws-sqs
        run: npm publish


