      S3_SECRET_KEY: dev_secret_key
      S3_REGION: us-east-1
      S3_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Start MinIO
        run: |
          docker run -d --name minio-s3 -p 127.0.0.1:9000:9000 \
            -e MINIO_ROOT_USER=dev_access_key \
            -e MINIO_ROOT_PASSWORD=dev_secret_key \
            minio/minio:latest server /data
