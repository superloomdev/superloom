# CI/CD Pipeline: Test and Publish Helper Modules
#
# Strategy:
#   - Each module has its own dedicated test + publish job pair
#   - One module's test failure does NOT block another module's publish
#   - Tests run ONLY for modules whose files changed (change-gated)
#   - Publishing is triggered ONLY by a version bump in package.json
#   - Registry check prevents accidental duplicate-publish failures
#   - Orphan/initial commits are handled (no parent = all modules changed/bumped)
#
# Publish ordering (tier system):
#   - Tier 1 (no deps):        utils, debug - run immediately
#   - Tier 2 (needs tier 1):   time, client-crypto, server-crypto, instance, http
#   - Tier 3 (needs instance): sqlite, postgres, mysql, aws-s3, aws-dynamodb
#   Test jobs wait for upstream publish jobs via needs: + always() so that
#   skipped publishes (no version bump) do not block downstream tests.
#
# Workflow behavior:
#   - Commit "wip: small fix"           → tests run, no publish
#   - Commit "fix: bug (bump to 1.0.1)" → tests run AND module publishes
#   - Commit reverting a version bump   → skipped gracefully at publish step
#
# Structure:
#   - detect job: scans changed modules (always) and version bumps (main push)
#   - Per-module sections: test-<name> → publish-<name> (grouped together)
#   - New modules: append a new section at the end of the file
#
# Workflow display name is "Test" (not "CI") so the README status badge
# reads "Test passing" — matches the label users expect and the pre-merge
# behavior. The file is ci-helper-modules.yml (scoped to helper modules).

name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  # =========================================================================
  # Detect: which modules changed (for testing) and which had version
  # bumps (for publishing). Runs on every trigger so test jobs can be
  # change-gated. Publishing is still main-push only.
  # =========================================================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      test_modules: ${{ steps.scan.outputs.test_modules }}
      publish_modules: ${{ steps.scan.outputs.publish_modules }}
      is_main_push: ${{ steps.scan.outputs.is_main_push }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Scan for changed modules and version bumps
        id: scan
        run: |
          # Determine trigger context
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            IS_MAIN_PUSH=true
          else
            IS_MAIN_PUSH=false
          fi
          echo "is_main_push=$IS_MAIN_PUSH" >> $GITHUB_OUTPUT

          # Any module with any file change → run tests
          # Handle orphan/initial commit (no parent) by listing all tracked files
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILE_LIST=$(git diff --name-only HEAD~1 HEAD)
          else
            FILE_LIST=$(git ls-tree -r --name-only HEAD)
          fi
          CHANGED=$(echo "$FILE_LIST" \
            | grep -oP 'src/helper-modules-[\w-]+/js-[\w-]+' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "test_modules=$CHANGED" >> $GITHUB_OUTPUT

          # Only modules whose package.json version field changed → publish
          # On orphan/initial commit (no parent), every module is treated as bumped
          HAS_PARENT=true
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            HAS_PARENT=false
          fi

          PUBLISH_LIST="[]"
          if [ "$IS_MAIN_PUSH" == "true" ] && [ "$CHANGED" != "[]" ]; then
            BUMPED=()
            for MODULE in $(echo "$CHANGED" | jq -r '.[]'); do
              PKG_PATH="$MODULE/package.json"

              if [ ! -f "$PKG_PATH" ]; then
                continue
              fi

              if [ "$HAS_PARENT" == "true" ]; then
                OLD_VERSION=$(git show HEAD~1:$PKG_PATH 2>/dev/null | jq -r '.version // "none"' 2>/dev/null || echo "none")
              else
                OLD_VERSION="none"
              fi
              NEW_VERSION=$(jq -r '.version' "$PKG_PATH")

              if [ "$OLD_VERSION" != "$NEW_VERSION" ] && [ "$NEW_VERSION" != "none" ]; then
                echo "  Version bumped: $MODULE ($OLD_VERSION -> $NEW_VERSION)"
                BUMPED+=("$MODULE")
              fi
            done

            if [ ${#BUMPED[@]} -gt 0 ]; then
              PUBLISH_LIST=$(printf '%s\n' "${BUMPED[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          echo "publish_modules=$PUBLISH_LIST" >> $GITHUB_OUTPUT

          echo ""
          echo "=== CI Summary ==="
          echo "Test modules:    $CHANGED"
          echo "Publish modules: $PUBLISH_LIST"
          echo "Main push:       $IS_MAIN_PUSH"


  # ###########################################################################
  #   MODULE: js-helper-utils
  # ###########################################################################

  test-utils:
    needs: [detect]
    if: contains(needs.detect.outputs.test_modules, 'js-helper-utils')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install module dependencies
        working-directory: src/helper-modules-core/js-helper-utils
        run: npm install

      - name: Run lint
        working-directory: src/helper-modules-core/js-helper-utils
        run: npm run lint --if-present

      - name: Run tests
        working-directory: src/helper-modules-core/js-helper-utils/_test
        run: npm install && npm test

  publish-utils:
    needs: [detect, test-utils]
    if: >-
      needs.detect.outputs.publish_modules != '[]' &&
      needs.detect.outputs.publish_modules != '' &&
      contains(needs.detect.outputs.publish_modules, 'js-helper-utils')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Pin npm to v10 (npm 11 crashes on GitHub Packages publish)
        run: npm install -g npm@10

      - name: Install dependencies
        working-directory: src/helper-modules-core/js-helper-utils
        run: npm install

      - name: Check if version already published (safety net)
        id: check
        working-directory: src/helper-modules-core/js-helper-utils
        run: |
          PKG_NAME=$(jq -r '.name' package.json)
          PKG_VERSION=$(jq -r '.version' package.json)
          echo "Checking if $PKG_NAME@$PKG_VERSION is already published..."

          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "  ⚠  $PKG_NAME@$PKG_VERSION is already published — skipping"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "  ✓ $PKG_NAME@$PKG_VERSION not yet published — proceeding"
          fi

      - name: Publish to GitHub Packages
        if: steps.check.outputs.already_published == 'false'
        working-directory: src/helper-modules-core/js-helper-utils
        run: npm publish


