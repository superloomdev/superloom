# MongoDB for module testing (single-node replica set for transaction support)
# Lifecycle managed by npm scripts: npm test starts → tests → stops and removes
# Ephemeral — data lost on container stop
#
# Replica set is required for transaction support. This is a single-node
# replica set — one container, no distributed sync, no extra complexity.
# MongoDB Atlas has replica set enabled by default.

name: superloom-test-mongodb

services:

  mongodb:
    image: mongo:8
    container_name: superloom-test-mongodb
    command: ["--replSet", "rs0"]
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      # Healthy ONLY when the node has finished primary election. The original
      # check returned ok as soon as `rs.initiate()` returned, but on a single-
      # node replica set the node spends another 1-2s in SECONDARY → STARTUP2
      # → PRIMARY before it accepts writes. Tests that started in that window
      # got `not master` errors on the first few writes (CI-only flake; local
      # macOS happened to be fast enough to hide it). `db.hello().isWritable
      # Primary` is true only when the node is actually primary, so quit(1)
      # forces docker to retry until the replica set is write-ready.
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) }; if (!db.hello().isWritablePrimary) quit(1)"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
