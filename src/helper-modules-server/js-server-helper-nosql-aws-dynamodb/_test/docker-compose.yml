# DynamoDB Local for module testing
# Lifecycle managed by npm scripts: npm test starts → tests → stops and removes
# Ephemeral — data lost on container stop

name: superloom-test-dynamodb

services:

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: superloom-test-dynamodb
    ports:
      - "127.0.0.1:8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000 2>/dev/null; [ $? -ne 7 ]"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
